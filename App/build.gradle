buildscript {
    repositories {
        mavenCentral()
    }
}

plugins {
    id 'java'
    id "org.sonarqube" version "6.3.1.5724"
}

sonar {
    properties {
        property "sonar.projectKey", "Aenao17_ASP"
        property "sonar.organization", "aenao17"
        property "sonar.sources", "frontend/asp/src"
    }
}

allprojects {
    group = 'asp'
    version = '0.0.1-SNAPSHOT'

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(17)
        }
    }
}